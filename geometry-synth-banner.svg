<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.5" stop-color="#120929"/>
      <stop offset="1" stop-color="#04050d"/>
    </linearGradient>

    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6adf"/>
      <stop offset="1" stop-color="#ff9f5a"/>
    </linearGradient>

    <linearGradient id="gridGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#48f3ff"/>
      <stop offset="1" stop-color="#ff4fd8"/>
    </linearGradient>

    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#61f7ff"/>
      <stop offset="0.5" stop-color="#c362ff"/>
      <stop offset="1" stop-color="#ff6ac1"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scanBars" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="transparent"/>
      <rect y="0" width="12" height="1.3" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1600" height="420" fill="url(#bgGrad)"/>
  <rect width="1600" height="420" fill="url(#scanBars)" opacity="0.9"/>

  <g opacity="0.4">
    <circle cx="260" cy="70" r="2" fill="#7cfbff">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="110" r="1.6" fill="#ff80d8">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1320" cy="80" r="2" fill="#7cfbff">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="48" r="1.8" fill="#ffa9e4">
      <animate attributeName="opacity" values="0.12;0.72;0.12" dur="4.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(0,28)">
    <ellipse cx="800" cy="108" rx="170" ry="70" fill="url(#sunGrad)" opacity="0.28" filter="url(#bigGlow)">
      <animate attributeName="ry" values="68;74;68" dur="2.6s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="800" cy="108" r="72" fill="url(#sunGrad)" filter="url(#softGlow)">
      <animate attributeName="r" values="70;76;70" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0.28">
      <rect x="728" y="58" width="144" height="4" fill="#14040f"/>
      <rect x="720" y="74" width="160" height="4" fill="#14040f"/>
      <rect x="712" y="90" width="176" height="4" fill="#14040f"/>
      <rect x="705" y="106" width="190" height="4" fill="#14040f"/>
      <rect x="712" y="122" width="176" height="4" fill="#14040f"/>
      <rect x="720" y="138" width="160" height="4" fill="#14040f"/>
      <rect x="730" y="154" width="140" height="4" fill="#14040f"/>
    </g>
  </g>

  <g opacity="0.75">
    <path d="M0 316 L320 268 L640 286 L960 246 L1280 272 L1600 218" stroke="url(#lineGlow)" stroke-width="2.2" fill="none" filter="url(#softGlow)">
      <animate attributeName="d" dur="2.3s" repeatCount="indefinite"
        values="M0 316 L320 268 L640 286 L960 246 L1280 272 L1600 218;
                M0 302 L320 280 L640 254 L960 278 L1280 242 L1600 232;
                M0 316 L320 268 L640 286 L960 246 L1280 272 L1600 218"/>
    </path>
    <path d="M0 332 L320 290 L640 310 L960 270 L1280 294 L1600 252" stroke="#7ef7ff" stroke-opacity="0.35" stroke-width="1.4" fill="none">
      <animate attributeName="d" dur="1.9s" repeatCount="indefinite"
        values="M0 332 L320 290 L640 310 L960 270 L1280 294 L1600 252;
                M0 326 L320 304 L640 286 L960 302 L1280 276 L1600 264;
                M0 332 L320 290 L640 310 L960 270 L1280 294 L1600 252"/>
    </path>
  </g>

  <g stroke="url(#gridGlow)" stroke-width="1" opacity="0.35">
    <path d="M800 214 L150 414"/>
    <path d="M800 214 L340 414"/>
    <path d="M800 214 L500 414"/>
    <path d="M800 214 L650 414"/>
    <path d="M800 214 L800 414"/>
    <path d="M800 214 L950 414"/>
    <path d="M800 214 L1100 414"/>
    <path d="M800 214 L1260 414"/>
    <path d="M800 214 L1450 414"/>

    <path d="M0 414 Q800 255 1600 414"/>
    <path d="M80 392 Q800 258 1520 392"/>
    <path d="M160 370 Q800 262 1440 370"/>
    <path d="M235 348 Q800 268 1365 348"/>
    <path d="M310 326 Q800 273 1290 326"/>
    <path d="M385 304 Q800 280 1215 304"/>
  </g>

  <g transform="translate(1090,92)" filter="url(#softGlow)">
    <polygon points="0,-58 50,-28 50,28 0,58 -50,28 -50,-28" stroke="#77f4ff" stroke-width="2" fill="none" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="12s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-36 31,-18 31,18 0,36 -31,18 -31,-18" stroke="#ff64cc" stroke-width="1.8" fill="none" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="8s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="0" cy="0" r="6" fill="#fff0fb" opacity="0.95"/>
  </g>

  <g transform="translate(350,110)" filter="url(#softGlow)">
    <polygon points="0,-44 44,0 0,44 -44,0" stroke="#7cfbff" stroke-width="2" fill="none" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="9s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-22 22,0 0,22 -22,0" stroke="#ff6dd3" stroke-width="1.8" fill="none" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="6s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g transform="translate(800,175)">
    <text x="0" y="0" text-anchor="middle" font-family="Verdana,Segoe UI,Arial,sans-serif" font-size="56" font-weight="700" fill="#effbff" letter-spacing="8">SYNTH GRID ENGINE</text>
    <text x="0" y="42" text-anchor="middle" font-family="Verdana,Segoe UI,Arial,sans-serif" font-size="17" font-weight="600" fill="#8bf8ff" letter-spacing="4">DETERMINISTIC GEOMETRY • MODULAR EXECUTION • VISUAL SYNTHSPACE</text>
    <rect x="-350" y="58" width="700" height="2" rx="1" fill="url(#lineGlow)" opacity="0.9" filter="url(#softGlow)">
      <animate attributeName="width" values="620;700;620" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="x" values="-310;-350;-310" dur="2.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
