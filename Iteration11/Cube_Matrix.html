<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Iteration 11 Thinker Only — Voxel Registry Front</title>
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;background:transparent}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w=0,h=0,dpr=1;
function resize(){ dpr=Math.min(devicePixelRatio||1,2); w=innerWidth; h=innerHeight; canvas.width=w*dpr; canvas.height=h*dpr; canvas.style.width=w+'px'; canvas.style.height=h+'px'; ctx.setTransform(dpr,0,0,dpr,0,0);} addEventListener('resize',resize); resize();
const TAU=Math.PI*2;
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
const rand = mulberry32(11011);

const labels = [
  'demiurge','eikos-mythos','paradigm-and-copy','platonic-solids-as-elements','precosmic-chaos','reason-and-necessity','receptacle-chora','time-moving-image-eternity','world-soul','eikos-mythos-status',
  'literal-vs-pedagogical-cosmogony','false-friends','terms','interlocutors','edition-decisions','epistemic-rules','external-references','health-checks','52b-hazard-reasoning','primary','secondary',
  'reception','works','common-misreadings','map','reading-path','reading-plateau','archive','receipts','planner','critic','repair','capsule','routes','signals'
];

const coreCenter = ()=>({x:w*0.42, y:h*0.52});
const registryBase = ()=>({x:w*0.66, y:h*0.19});

const voxels=[];
for(let i=0;i<1700;i++){
  const y = (rand()*2-1)*120;
  const headScale = 1 - Math.abs(y)/170;
  const radius = (55 + 62*headScale + rand()*12);
  const a = rand()*TAU;
  let x = Math.cos(a)*radius;
  let z = Math.sin(a)*radius*0.78;
  // face-ish front profile
  const faceBias = Math.max(0, x);
  x += faceBias*0.18;
  if(y < -25) x -= (Math.abs(y)-25)*0.06; // jaw retreat
  if(y > 55) x *= 0.74; // crown taper
  if(y < -95) x *= 0.85;
  // carve back of head slightly flatter
  if(x < -35) x *= 0.8;
  const q = 5;
  x = Math.round(x/q)*q;
  z = Math.round(z/q)*q;
  const alive = rand();
  const size = 4 + Math.floor(rand()*3);
  voxels.push({x,y,z,size,alive,phase:rand()*TAU});
}

const floaters=[];
for(let i=0;i<80;i++){
  floaters.push({
    x: (rand()*2-1)*140,
    y: (rand()*2-1)*145,
    z: (rand()*2-1)*80,
    s: 4+rand()*5,
    drift: rand()*TAU,
    group: rand()>.5?0:1
  });
}

const registry=[];
const anchorX = registryBase().x;
const anchorY = registryBase().y;
for(let i=0;i<labels.length;i++){
  registry.push({
    label: labels[i],
    level: i,
    x: anchorX + (i%2)*10,
    y: anchorY + i*17,
    active: rand(),
    pulse: rand()*TAU,
    kind: i<10?'concept':i<18?'debate':i<28?'meta':'runtime'
  });
}
const trunk = [
  {name:'concepts', y: registryBase().y + 34},
  {name:'debates', y: registryBase().y + 125},
  {name:'glossary', y: registryBase().y + 170},
  {name:'interlocutors', y: registryBase().y + 225},
  {name:'meta', y: registryBase().y + 275},
  {name:'passages', y: registryBase().y + 330},
  {name:'reception', y: registryBase().y + 385},
];

function project(x,y,z,t){
  const yaw = 0.55 + Math.sin(t*0.00016)*0.04;
  const pitch = -0.12;
  const cx=Math.cos(yaw), sx=Math.sin(yaw);
  const cy=Math.cos(pitch), sy=Math.sin(pitch);
  const x1 = x*cx - z*sx;
  const z1 = x*sx + z*cx;
  const y2 = y*cy - z1*sy;
  const z2 = y*sy + z1*cy;
  const cam = 410;
  const s = cam/(cam+z2+220);
  const c = coreCenter();
  return {x:c.x + x1*s, y:c.y + y2*s, s, z:z2};
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawCube(p, size, colorA, colorB){
  const s = size*p.s;
  const x = p.x, y = p.y;
  ctx.fillStyle = colorA;
  ctx.fillRect(x-s*0.5, y-s*0.5, s, s);
  ctx.strokeStyle = colorB;
  ctx.lineWidth = Math.max(1, p.s*0.8);
  ctx.strokeRect(x-s*0.5, y-s*0.5, s, s);
}

function draw(t){
  ctx.clearRect(0,0,w,h);

  // faint radial thinker field
  const c = coreCenter();
  const g = ctx.createRadialGradient(c.x,c.y,20,c.x,c.y,Math.min(w,h)*0.28);
  g.addColorStop(0,'rgba(165,120,255,0.16)');
  g.addColorStop(0.4,'rgba(130,70,255,0.08)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,w,h);

  // registry front links to thinker
  const bridgeNodes = [
    {x: c.x+70, y: c.y-48},
    {x: c.x+52, y: c.y-4},
    {x: c.x+66, y: c.y+44},
  ];
  ctx.lineWidth = 1.2;
  trunk.forEach((tr, idx)=>{
    const tx = w*0.60;
    const alpha = 0.16 + 0.08*Math.sin(t*0.0012 + idx);
    ctx.strokeStyle = `rgba(205,205,225,${alpha})`;
    ctx.beginPath();
    ctx.moveTo(c.x+40, c.y + (idx-2.5)*20);
    ctx.bezierCurveTo(c.x+110, c.y + (idx-2.5)*24, tx-30, tr.y, tx, tr.y);
    ctx.stroke();
  });

  // thinker voxel mass, back to front
  const projected = voxels.map(v=>({v,p:project(v.x,v.y,v.z,t)})).sort((a,b)=>a.p.z-b.p.z);
  for(const {v,p} of projected){
    const glow = 0.55 + 0.45*Math.sin(t*0.0018 + v.phase);
    const fill = v.alive > 0.55
      ? `rgba(84,116,255,${0.58+0.22*glow})`
      : `rgba(255,116,84,${0.55+0.16*glow})`;
    const edge = v.alive > 0.55
      ? `rgba(180,214,255,${0.75})`
      : `rgba(255,188,145,${0.72})`;
    drawCube(p, v.size, fill, edge);
  }

  // floating dead-space cubes
  const floaterProj = floaters.map(f=>({f,p:project(f.x + Math.cos(t*0.0014+f.drift)*8, f.y + Math.sin(t*0.0011+f.drift)*8, f.z + Math.sin(t*0.0017+f.drift)*10, t)})).sort((a,b)=>a.p.z-b.p.z);
  for(const {f,p} of floaterProj){
    const pulse = 0.4+0.6*Math.sin(t*0.002+f.drift);
    const fill = f.group===0 ? `rgba(255,120,96,${0.55+0.18*pulse})` : `rgba(96,138,255,${0.5+0.2*pulse})`;
    const edge = f.group===0 ? 'rgba(255,196,164,0.8)' : 'rgba(205,224,255,0.8)';
    drawCube(p, f.s, fill, edge);
  }

  // communication links over mass
  ctx.lineWidth = 1.2;
  for(let i=0;i<24;i++){
    const a = projected[(i*19)%projected.length].p;
    const b = projected[(i*53+17)%projected.length].p;
    ctx.strokeStyle = `rgba(214,220,255,${0.15 + 0.1*Math.sin(t*0.001 + i)})`;
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
  }

  // central reticle thinker anchor
  ctx.strokeStyle='rgba(220,240,255,0.5)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(c.x,c.y,20,0,TAU); ctx.stroke();
  ctx.beginPath(); ctx.arc(c.x,c.y,32,0,TAU); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(c.x-16,c.y); ctx.lineTo(c.x+16,c.y); ctx.moveTo(c.x,c.y-16); ctx.lineTo(c.x,c.y+16); ctx.stroke();

  // registry front trunk and categories
  const tx = w*0.60;
  const ty = registryBase().y;
  trunk.forEach((tr, idx)=>{
    const boxX = tx-16;
    const boxY = tr.y-8;
    ctx.fillStyle = 'rgba(238,232,220,0.92)';
    ctx.fillRect(boxX, boxY, 12, 12);
    ctx.fillStyle = idx % 2 ? 'rgba(255,120,90,0.9)' : 'rgba(78,110,255,0.95)';
    ctx.fillRect(boxX+1, boxY+1, 10, 10);
    ctx.strokeStyle='rgba(120,120,120,0.45)';
    ctx.strokeRect(boxX, boxY, 12, 12);
    roundRect(tx+6, tr.y-12, 84, 20, 3);
    ctx.fillStyle='rgba(237,231,220,0.95)'; ctx.fill();
    ctx.strokeStyle='rgba(120,112,96,0.55)'; ctx.stroke();
    ctx.fillStyle='rgba(82,74,67,0.95)';
    ctx.font='12px ui-monospace, SFMono-Regular, Menlo, monospace';
    ctx.fillText(tr.name, tx+12, tr.y+2);
  });

  // registry entries
  registry.forEach((r, i)=>{
    const rx = w*0.70;
    const y = r.y;
    ctx.fillStyle='rgba(238,232,220,0.96)';
    ctx.fillRect(rx-18, y-8, 12, 12);
    ctx.fillStyle = i % 2 ? 'rgba(255,120,90,0.95)' : 'rgba(78,110,255,0.95)';
    ctx.fillRect(rx-17, y-7, 10, 10);
    const tw = Math.max(90, r.label.length*7.3);
    roundRect(rx, y-12, tw, 20, 3);
    ctx.fillStyle = 'rgba(238,232,220,0.97)'; ctx.fill();
    ctx.strokeStyle='rgba(120,112,96,0.55)'; ctx.stroke();
    ctx.fillStyle='rgba(77,71,65,0.96)';
    ctx.font='12px ui-monospace, SFMono-Regular, Menlo, monospace';
    ctx.fillText(r.label, rx+7, y+2);

    // subtle live connector pulses
    const pulseX = rx - 35 + Math.sin(t*0.003 + r.pulse)*6;
    ctx.strokeStyle=`rgba(160,160,160,${0.28+0.18*Math.sin(t*0.002+r.pulse)})`;
    ctx.beginPath();
    ctx.moveTo(w*0.64, y);
    ctx.lineTo(rx-18, y);
    ctx.stroke();
    ctx.fillStyle='rgba(176,176,176,0.5)';
    ctx.fillRect(pulseX, y-1, 5, 2);
  });

  // label card
  ctx.fillStyle='rgba(235,229,219,0.96)';
  roundRect(w*0.83, h*0.42, 170, 44, 3); ctx.fill();
  ctx.strokeStyle='rgba(120,112,96,0.55)'; ctx.stroke();
  ctx.fillStyle='rgba(86,78,71,0.96)';
  ctx.font='10px ui-monospace, SFMono-Regular, Menlo, monospace';
  ctx.fillText('RAW/PRIMARY/', w*0.835, h*0.445);
  ctx.fillText('(primary/ has no README)', w*0.835, h*0.47);

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
