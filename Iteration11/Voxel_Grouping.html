<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Iteration 11 Thinker — Deadspace Registry v2</title>
<style>
  html,body{margin:0;height:100%;background:#111;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  canvas{display:block;width:100vw;height:100vh;background:#e7ddcf}
  .hint{position:fixed;left:12px;bottom:12px;padding:8px 10px;border:1px solid rgba(90,80,70,.25);background:rgba(255,250,243,.75);color:#544d45;font-size:12px;border-radius:8px;backdrop-filter: blur(4px)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">Wheel = zoom • Drag = orbit thinker • Click labels/cubes = focus cluster</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w=0,h=0,dpr=1;
function resize(){dpr=Math.min(devicePixelRatio||1,2);w=innerWidth;h=innerHeight;canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}
addEventListener('resize',resize);resize();

const TAU=Math.PI*2;
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
const rand=mulberry32(11117);

let zoom=1.0, yaw=-0.72, pitch=-0.08, dragging=false, lx=0, ly=0;
canvas.addEventListener('wheel',e=>{ e.preventDefault(); zoom=Math.max(.55,Math.min(2.1, zoom + Math.sign(e.deltaY)*-0.08)); }, {passive:false});
canvas.addEventListener('mousedown',e=>{ dragging=true; lx=e.clientX; ly=e.clientY;});
addEventListener('mouseup',()=>dragging=false);
addEventListener('mousemove',e=>{ if(!dragging) return; yaw += (e.clientX-lx)*0.006; pitch += (e.clientY-ly)*0.003; pitch=Math.max(-0.5,Math.min(0.5,pitch)); lx=e.clientX; ly=e.clientY; });

// ---- thinker voxel body ----
// geometrically 2D silhouette extruded with shallow z to feel visually 3D.
const layers=[
  {y0:-170,y1:-135,r:22},
  {y0:-135,y1:-105,r:36},
  {y0:-105,y1:-70,r:52},
  {y0:-70,y1:-20,r:68},
  {y0:-20,y1:28,r:78},
  {y0:28,y1:78,r:70},
  {y0:78,y1:130,r:54},
  {y0:130,y1:185,r:30}
];
const voxels=[];
for(const L of layers){
  for(let y=L.y0;y<L.y1;y+=6){
    for(let x=-L.r;x<=L.r;x+=6){
      const nx=x/L.r, ny=(y-(L.y0+L.y1)/2)/((L.y1-L.y0)/2);
      if(nx*nx + ny*ny > 1) continue;
      // profile shaping for face / back / neck
      let profile = 1;
      if(x>0) profile += 0.18; // face push
      if(y>72 && x>8) profile -= 0.22; // neck/chin carve
      if(y<-120 && x<-2) profile -= 0.25; // skull taper
      if(y>120 && x<-4) profile -= 0.18; // lower neck back cut
      if(rand()>profile) continue;
      const zDepth = 5 + Math.floor((1-(nx*nx))*6);
      for(let zi=-zDepth; zi<=zDepth; zi+=6){
        // carve eye / mouth cavities, back hollows, and dead-space holes
        const eye = (x>24 && x<44 && y>-48 && y<-14 && Math.abs(zi)<12);
        const cheek = (x>36 && x<50 && y>-4 && y<42 && Math.abs(zi)<10);
        const mouth = (x>18 && x<44 && y>44 && y<68 && Math.abs(zi)<14);
        const crownVoid = (x>-8 && x<18 && y<-130 && Math.abs(zi)<8 && rand()>0.35);
        const randomVoid = rand()>0.972;
        if(eye||cheek||mouth||crownVoid||randomVoid) continue;
        const group = (x+zi*0.5>4) ? 'orange' : 'blue';
        voxels.push({x,y,z:zi,s:5,group,phase:rand()*TAU,cluster: Math.floor((y+170)/45)});
      }
    }
  }
}

const floaters=[];
for(let i=0;i<260;i++){
  const ang=rand()*TAU;
  const dist=95+rand()*90;
  floaters.push({
    x: Math.cos(ang)*dist + (rand()*2-1)*18,
    y: (rand()*2-1)*170,
    z: (rand()*2-1)*44,
    s: 4,
    group: rand()>0.55?'orange':'blue',
    phase: rand()*TAU,
    cluster: Math.floor(rand()*7)
  });
}

const concepts={
  concepts:['demiurge','eikos-mythos','paradigm-and-copy','platonic-solids-as-elements','precosmic-chaos','reason-and-necessity','receptacle-chora','time-moving-image-eternity','world-soul','eikos-mythos-status'],
  debates:['literal-vs-pedagogical-cosmogony','what-is-the-receptacle','false-friends'],
  glossary:['terms','interlocutors'],
  meta:['plato-timaeus-translation-format','edition-decisions','epistemic-rules','external-references','health-checks','52b-hazard-reasoning'],
  passages:['primary','raw','secondary'],
  reception:['works','common-misreadings','map','reading-path','reading-plateau'],
  runtime:['archive','receipts','planner','critic','repair','capsule','routes','signals']
};
const trunks = Object.keys(concepts);
let selectedGroup='concepts';
const groupIndex = Object.fromEntries(trunks.map((g,i)=>[g,i]));

const bodyCenter=()=>({x:w*0.255,y:h*0.56});
function projectIso(x,y,z){
  const c=bodyCenter();
  const cx=Math.cos(yaw), sx=Math.sin(yaw), cy=Math.cos(pitch), sy=Math.sin(pitch);
  const x1=x*cx-z*sx;
  const z1=x*sx+z*cx;
  const y1=y*cy-z1*sy;
  const z2=y*sy+z1*cy;
  const scale=(1.85*zoom)*(380/(380+z2+140));
  return {x:c.x + x1*scale, y:c.y + y1*scale, z:z2, scale};
}
function shade(base, amt){
  const [r,g,b]=base;
  return `rgb(${Math.max(0,Math.min(255,r+amt))},${Math.max(0,Math.min(255,g+amt))},${Math.max(0,Math.min(255,b+amt))})`;
}
function drawVoxel(px,py,sz,group,active){
  const blue=[64,95,230], orange=[225,100,46];
  const base=group==='blue'?blue:orange;
  const lift=active?55:0;
  const front=shade(base,lift);
  const side=shade(base,-34+lift*0.45);
  const top=shade(base,40+lift*0.25);
  const d=sz*0.34;
  ctx.beginPath();
  ctx.moveTo(px-sz/2,py-sz/2);
  ctx.lineTo(px+sz/2,py-sz/2);
  ctx.lineTo(px+sz/2+d,py-sz/2-d);
  ctx.lineTo(px-sz/2+d,py-sz/2-d);
  ctx.closePath();
  ctx.fillStyle=top; ctx.fill();

  ctx.beginPath();
  ctx.moveTo(px+sz/2,py-sz/2);
  ctx.lineTo(px+sz/2,py+sz/2);
  ctx.lineTo(px+sz/2+d,py+sz/2-d);
  ctx.lineTo(px+sz/2+d,py-sz/2-d);
  ctx.closePath();
  ctx.fillStyle=side; ctx.fill();

  ctx.fillStyle=front;
  ctx.fillRect(px-sz/2,py-sz/2,sz,sz);
  ctx.strokeStyle='rgba(18,18,18,0.18)';
  ctx.lineWidth=0.8;
  ctx.strokeRect(px-sz/2,py-sz/2,sz,sz);
}

function groupNameForCluster(cluster){ return trunks[Math.max(0,Math.min(trunks.length-1, cluster))] || 'concepts'; }

const hitRegions=[];
canvas.addEventListener('click', e=>{
  const x=e.clientX, y=e.clientY;
  for(const r of hitRegions){
    if(x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h){ selectedGroup=r.group; return; }
  }
  // select nearest floating cluster/cube
  let best=null,bestD=1e9;
  for(const p of lastScreenPoints){
    const d=(p.x-x)**2+(p.y-y)**2;
    if(d<bestD && d<350) { bestD=d; best=p; }
  }
  if(best) selectedGroup = best.groupName;
});
let lastScreenPoints=[];

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawTree(t){
  hitRegions.length=0;
  const rootX=w*0.53, rootY=h*0.30;
  const stemX=w*0.63;
  const line='#9b9185';
  const groups=trunks;
  const activeIdx=groupIndex[selectedGroup] ?? 0;

  // root connectors from body to groups
  ctx.lineWidth=1.2;
  groups.forEach((g,i)=>{
    const gy=rootY + i*48;
    ctx.strokeStyle = i===activeIdx ? 'rgba(62,62,62,0.72)' : 'rgba(120,114,104,0.34)';
    ctx.beginPath();
    ctx.moveTo(w*0.38, h*0.50 + (i-activeIdx)*8);
    ctx.bezierCurveTo(w*0.46, gy, w*0.55, gy, stemX-12, gy);
    ctx.stroke();

    // cube marker
    drawLegendCube(stemX-20, gy, i===activeIdx);
    const width=Math.max(88,g.length*8+20);
    rr(stemX, gy-12, width, 22, 4);
    ctx.fillStyle='rgba(235,228,218,0.96)'; ctx.fill();
    ctx.strokeStyle=i===activeIdx?'rgba(70,70,70,0.8)':'rgba(131,120,108,0.5)'; ctx.stroke();
    ctx.fillStyle='rgba(84,77,71,0.96)'; ctx.font='12px ui-monospace, SFMono-Regular, Menlo, monospace';
    ctx.fillText(g, stemX+8, gy+3);
    hitRegions.push({x:stemX,y:gy-12,w:width,h:22,group:g});
  });

  // active branch details
  const items=concepts[selectedGroup];
  const branchX=w*0.78;
  const baseY=rootY + activeIdx*48 - Math.max(0,(items.length-1))*13;
  items.forEach((txt, idx)=>{
    const y=baseY + idx*26;
    ctx.strokeStyle='rgba(132,126,118,0.58)';
    ctx.beginPath(); ctx.moveTo(stemX+108, rootY + activeIdx*48); ctx.lineTo(branchX-20, y); ctx.stroke();
    drawLegendCube(branchX-32,y,false,idx%2?'orange':'blue');
    const width=Math.max(120, txt.length*7.1+18);
    rr(branchX-14, y-12, width, 22, 4);
    ctx.fillStyle='rgba(235,228,218,0.96)'; ctx.fill();
    ctx.strokeStyle='rgba(131,120,108,0.48)'; ctx.stroke();
    ctx.fillStyle='rgba(84,77,71,0.98)'; ctx.font='12px ui-monospace, SFMono-Regular, Menlo, monospace';
    ctx.fillText(txt, branchX-6, y+3);
  });

  // raw note card like screenshot
  rr(w*0.855, h*0.36, 165, 44, 3);
  ctx.fillStyle='rgba(235,228,218,0.94)'; ctx.fill();
  ctx.strokeStyle='rgba(131,120,108,0.5)'; ctx.stroke();
  ctx.fillStyle='rgba(84,77,71,0.98)'; ctx.font='10px ui-monospace, SFMono-Regular, Menlo, monospace';
  ctx.fillText('RAW/PRIMARY/', w*0.865, h*0.386);
  ctx.fillText('(primary/ has no README)', w*0.865, h*0.41);
}
function drawLegendCube(x,y,active=false,force){
  const group=force || (active?'orange':'blue');
  const front=group==='orange'?'rgb(225,100,46)':'rgb(64,95,230)';
  const side=group==='orange'?'rgb(173,75,30)':'rgb(42,70,182)';
  const top=group==='orange'?'rgb(244,147,100)':'rgb(108,136,255)';
  const s=10,d=3;
  ctx.beginPath();ctx.moveTo(x,y-s/2);ctx.lineTo(x+s,y-s/2);ctx.lineTo(x+s+d,y-s/2-d);ctx.lineTo(x+d,y-s/2-d);ctx.closePath();ctx.fillStyle=top;ctx.fill();
  ctx.beginPath();ctx.moveTo(x+s,y-s/2);ctx.lineTo(x+s,y+s/2);ctx.lineTo(x+s+d,y+s/2-d);ctx.lineTo(x+s+d,y-s/2-d);ctx.closePath();ctx.fillStyle=side;ctx.fill();
  ctx.fillStyle=front;ctx.fillRect(x,y-s/2,s,s);
  ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.strokeRect(x,y-s/2,s,s);
}

function draw(t){
  ctx.clearRect(0,0,w,h);
  // paper-like background
  ctx.fillStyle='#e7ddcf'; ctx.fillRect(0,0,w,h);
  ctx.save();
  ctx.globalAlpha=0.07;
  for(let i=0;i<22;i++){
    ctx.strokeStyle=`rgba(0,0,0,${0.035 + ((i%3)/100)})`;
    ctx.beginPath(); ctx.moveTo(0,i*42+((t*0.002)%42)); ctx.lineTo(w,i*42+((t*0.002)%42)); ctx.stroke();
  }
  ctx.restore();

  const projected=[];
  lastScreenPoints=[];
  for(const v of voxels){
    const p=projectIso(v.x,v.y,v.z);
    projected.push({v,p,groupName:groupNameForCluster(v.cluster)});
  }
  for(const f of floaters){
    const x=f.x + Math.sin(t*0.0012 + f.phase)*8;
    const y=f.y + Math.cos(t*0.0009 + f.phase)*6;
    const z=f.z + Math.sin(t*0.0015 + f.phase)*8;
    const p=projectIso(x,y,z);
    projected.push({v:f,p,groupName:groupNameForCluster(f.cluster), floater:true});
  }
  projected.sort((a,b)=>a.p.z-b.p.z);

  // subtle body shadow
  const c=bodyCenter();
  const shadow=ctx.createRadialGradient(c.x-12,c.y+10,20,c.x-12,c.y+10,220*zoom);
  shadow.addColorStop(0,'rgba(0,0,0,0.07)');
  shadow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shadow; ctx.fillRect(0,0,w,h);

  for(const item of projected){
    const {v,p,groupName,floater}=item;
    if(p.x<-100 || p.x>w+100 || p.y<-100 || p.y>h+100) continue;
    const active = groupName===selectedGroup;
    const size = (floater? v.s : v.s) * p.scale * (floater?1.05:1);
    drawVoxel(p.x,p.y,size,v.group,active);
    if(floater || (Math.random()<0.002)) lastScreenPoints.push({x:p.x,y:p.y,groupName});
  }

  // communication links only for selected cluster family
  const activePts = projected.filter(o=>o.groupName===selectedGroup).slice(0,120);
  ctx.lineWidth=1;
  for(let i=0;i<Math.min(32, activePts.length-1); i++){
    const a=activePts[(i*5)%activePts.length]?.p;
    const b=activePts[(i*7+9)%activePts.length]?.p;
    if(!a||!b) continue;
    ctx.strokeStyle='rgba(100,100,100,0.18)';
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }

  // root selection ring
  ctx.strokeStyle='rgba(70,70,70,0.35)'; ctx.lineWidth=1.1;
  ctx.beginPath(); ctx.arc(bodyCenter().x, bodyCenter().y, 32*zoom, 0, TAU); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bodyCenter().x-18*zoom, bodyCenter().y); ctx.lineTo(bodyCenter().x+18*zoom, bodyCenter().y); ctx.moveTo(bodyCenter().x,bodyCenter().y-18*zoom); ctx.lineTo(bodyCenter().x,bodyCenter().y+18*zoom); ctx.stroke();

  drawTree(t);

  // title strip
  ctx.fillStyle='rgba(60,48,38,0.92)'; ctx.font='13px ui-monospace, SFMono-Regular, Menlo, monospace';
  ctx.fillText('ITERATION 11 THINKER / DEADSPACE VOXEL REGISTRY', 18, 24);
  ctx.fillStyle='rgba(92,84,76,0.95)'; ctx.font='11px ui-monospace, SFMono-Regular, Menlo, monospace';
  ctx.fillText(`selected=${selectedGroup}  zoom=${zoom.toFixed(2)}`, 18, 44);

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
